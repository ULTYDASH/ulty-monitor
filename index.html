<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ULTY Options Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080810;color:#c8cad4;font-family:'IBM Plex Mono','Fira Code',monospace;font-size:12px}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
button{font-family:inherit;cursor:pointer}table{border-collapse:collapse;border-spacing:0}
.header{background:#0f1117;border-bottom:1px solid rgba(255,255,255,0.05);padding:8px 16px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:50}
.dot{width:7px;height:7px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px rgba(34,197,94,0.4)}
.logo{font-weight:700;font-size:13px;letter-spacing:1.5px}.subtitle{color:#52556a;font-size:10px;letter-spacing:0.5px}
.tabs{display:flex;gap:1px;margin-left:16px}
.tab{background:transparent;color:#52556a;border:1px solid transparent;border-radius:5px;padding:5px 12px;font-size:10px;font-weight:400;display:flex;align-items:center;gap:5px}
.tab.active{background:rgba(91,106,191,0.13);color:#8b95d4;border-color:rgba(91,106,191,0.2);font-weight:600}
.tab-badge{background:#ef4444;color:#fff;border-radius:8px;padding:0 5px;font-size:8px;font-weight:700;line-height:16px}
.tab-badge.warn{background:#f59e0b}.tab-badge.info{background:#5b6abf}
.header-right{margin-left:auto;display:flex;align-items:center;gap:14px;font-size:10px;color:#52556a}
.content{padding:16px}
.metrics{display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap;align-items:flex-end}
.metric{min-width:100px}.metric-label{font-size:9px;color:#52556a;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:3px}
.metric-value{font-size:18px;font-weight:700}.metric-sub{font-size:9px;color:#7a7d8e;margin-top:1px}
.badge{padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:0.3px;display:inline-block}
.badge-sm{padding:1px 5px;font-size:9px}
.grid{border-radius:6px;border:1px solid rgba(255,255,255,0.05);overflow:hidden}
.grid-header{display:flex;background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.05);padding:6px 0}
.grid-header div{padding:0 4px;font-size:9px;color:#52556a;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0}
.pos-group-header{display:flex;align-items:center;background:#141820;border-bottom:1px solid rgba(255,255,255,0.05);padding:5px 0;cursor:pointer;user-select:none}
.pos-group-header:hover{background:#181e2a}
.pos-row{display:flex;align-items:center;border-bottom:1px solid rgba(255,255,255,0.05);padding:4px 0;padding-left:8px}
.pos-row:nth-child(even){background:rgba(255,255,255,0.012)}
.alert-row{border-radius:5px;padding:8px 12px;display:flex;align-items:center;gap:10px;margin-bottom:2px}
.alert-CRITICAL{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.13)}
.alert-URGENT{background:rgba(245,158,11,0.06);border:1px solid rgba(245,158,11,0.1)}
.alert-WARNING{background:rgba(212,160,23,0.04);border:1px solid rgba(212,160,23,0.08)}
.alert-INFO{background:rgba(34,197,94,0.03);border:1px solid rgba(34,197,94,0.06)}
.btn{border:none;border-radius:4px;padding:3px 10px;font-size:9px;font-weight:700;color:#fff}
.btn-accent{background:#5b6abf}.btn-green{background:#22c55e}.btn-red{background:#ef4444}
.btn-ghost{background:rgba(255,255,255,0.04);color:#52556a;border:1px solid rgba(255,255,255,0.08)}
.btn-accent-ghost{background:rgba(91,106,191,0.15);color:#5b6abf;border:1px solid rgba(91,106,191,0.3)}
.mono{font-family:'IBM Plex Mono',monospace}
.green{color:#22c55e}.red{color:#ef4444}.orange{color:#f59e0b}.yellow{color:#d4a017}.dim{color:#7a7d8e}.muted{color:#52556a}.text{color:#c8cad4}.bold{font-weight:700}
table.data-table{width:100%;font-size:11px}
table.data-table th{padding:6px 5px;text-align:center;font-size:9px;color:#52556a;border-bottom:1px solid rgba(255,255,255,0.05)}
table.data-table th:first-child{text-align:left}
table.data-table td{padding:5px;border-bottom:1px solid rgba(255,255,255,0.05)}
table.data-table tr:nth-child(even){background:rgba(255,255,255,0.015)}
details summary{list-style:none}details summary::-webkit-details-marker{display:none}
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center;gap:6px"><div class="dot" id="statusDot"></div><span class="logo">ULTY</span><span class="subtitle">MONITOR</span></div>
  <div class="tabs" id="tabBar"></div>
  <div class="header-right"><span id="navDisplay">$890M NAV</span><span>25 names</span><span id="clock" class="dim"></span></div>
</div>
<div class="content" id="content"></div>

<script>
const API = 'http://localhost:8000';

// ─── HOSTED MODE ───
const HOSTED = true;
const GIST_URL = 'https://gist.githubusercontent.com/ULTYDASH/b2779d34c1a3973c901faee23ba0522d/raw/ulty_live.json';
const GIST_API = 'https://api.github.com/gists/b2779d34c1a3973c901faee23ba0522d';

let DATA = null, ALERTS = [], TRADES = [], BUILDS = [], ANALYTICS = null, COLLAPSED = {};
let currentTab = 'performance';
const TABS = [
  {id:'performance',label:'Performance'},
  {id:'positions',label:'Positions'},
  {id:'trades',label:'Trades'},
  {id:'weeklyBuild',label:'Weekly Build'},
  {id:'alerts',label:'Alerts'},
  {id:'earnings',label:'Earnings'},
  {id:'settings',label:'Config'},
];

// ─── DATA ───
async function fetchData() {
  if (typeof HOSTED !== 'undefined' && HOSTED) {
    try {
      const r = await fetch(GIST_API, {headers:{'Accept':'application/vnd.github.v3+json'}, cache:'no-store'});
      if (r.ok) {
        const gist = await r.json();
        const content = gist?.files?.['ulty_live.json']?.content;
        if (content) {
          const hosted = JSON.parse(content);
          if (hosted.positions) { DATA = hosted; ALERTS = genAlerts(DATA.positions); document.getElementById('statusDot').style.background='#22c55e'; if(DATA.nav) document.getElementById('navDisplay').textContent='$'+DATA.nav.toLocaleString()+' NAV'; }
          if (hosted.live) LIVE = hosted.live;
          if (hosted.analytics) ANALYTICS = hosted.analytics;
          if (hosted.triggers) TRADES = hosted.triggers;
          if (hosted.builds) BUILDS = hosted.builds;
        }
      }
    } catch(e) { document.getElementById('statusDot').style.background='#f59e0b'; }
    // Sync live prices into positions
    if(LIVE?.prices && DATA?.positions){
      DATA.positions.forEach(p=>{
        const lp=LIVE.prices[p.ticker];
        if(lp?.last) p.spot=lp.last;
        if(lp?.open) p.spotOpen=lp.open;
        if(lp?.chg_pct!=null) p.chgPct=lp.chg_pct;
      });
    }
    render();
    return;
  }
  try {
    const r = await fetch(API+'/api/positions');
    if (r.ok) { DATA = await r.json(); if(DATA.positions){ALERTS=genAlerts(DATA.positions);document.getElementById('statusDot').style.background='#22c55e';if(DATA.nav)document.getElementById('navDisplay').textContent='$'+DATA.nav.toLocaleString()+' NAV';}}
  } catch(e) { if(!DATA)DATA={positions:[]}; document.getElementById('statusDot').style.background='#f59e0b'; }
  try { const r=await fetch(API+'/api/triggers'); if(r.ok){const d=await r.json();TRADES=(d.trades||[]).filter(t=>t.rule!=='WEEKLY_BUILD');} } catch(e){}
  try { const r=await fetch(API+'/api/builds'); if(r.ok){const d=await r.json();BUILDS=d.trades||[];} } catch(e){}
  // Analytics fetched separately — not on every cycle
  if(!ANALYTICS){try{const r=await fetch(API+'/api/analytics');if(r.ok){ANALYTICS=await r.json();}}catch(e){}}
  await fetchLive();
  // Sync live prices into position data before render
  if(LIVE?.prices && DATA?.positions){
    DATA.positions.forEach(p=>{
      const lp=LIVE.prices[p.ticker];
      if(lp?.last) p.spot=lp.last;
      if(lp?.open) p.spotOpen=lp.open;
      if(lp?.chg_pct!=null) p.chgPct=lp.chg_pct;
    });
  }
  render();
}

function reliablePrice(leg, spot) {
  if(!leg)return[0,false];const bid=Math.max(leg.bid||0,0),ask=Math.max(leg.ask||0,0),mid=Math.max(leg.mid||0,0),last=Math.max(leg.last||0,0);
  const k=leg.strike||0,ot=leg.type||'C',otm=ot==='C'?(k/spot-1)*100:(1-k/spot)*100;
  if(bid>0&&ask>0&&ask>=bid)return[(bid+ask)/2,true];if(bid===0&&ask>0&&ask<=0.10)return[ask*0.5,true];
  if(bid===0&&ask>0.10)return[ask*0.25,false];if(mid>0){if(otm>8&&mid>spot*0.03)return[mid,false];return[mid,true];}
  if(last>0){if(otm>5&&last>spot*0.02)return[last,false];return[last,false];}return[0,false];
}

function genAlerts(positions) {
  const a=[],now=new Date().toLocaleTimeString();
  (positions||[]).forEach(p=>{const spot=p.spot||0;if(spot<=0)return;const legs=p.legs||[];
    const sc=legs.find(l=>l.type==='C'&&l.side==='SHORT'),sp=legs.find(l=>l.type==='P'&&l.side==='SHORT'),lp=legs.find(l=>l.type==='P'&&l.side==='LONG');
    const[scp,sco]=reliablePrice(sc,spot),[spp,spo]=reliablePrice(sp,spot),[lpp,lpo]=reliablePrice(lp,spot);
    if(sc&&sc.cost>0&&sco&&scp>0&&scp/sc.cost<=0.10)a.push({time:now,ticker:p.ticker,rule:'R1',level:'INFO',leg:'C',desc:'Call '+(100*(1-scp/sc.cost)).toFixed(0)+'% captured ($'+scp.toFixed(2)+' of $'+sc.cost.toFixed(2)+')',action:'Close call. Recap same week.'});
    if(sc&&Math.abs(sc.delta||0)>=0.60)a.push({time:now,ticker:p.ticker,rule:'R3',level:'WARNING',leg:'C',desc:'Call Δ '+Math.abs(sc.delta).toFixed(2)+' ≥ 0.60',action:'Close call. Leave uncapped.'});
    if(sp&&Math.abs(sp.delta||0)>=0.85)a.push({time:now,ticker:p.ticker,rule:'R4',level:'CRITICAL',leg:'P',desc:'PUT STOP: SP Δ '+Math.abs(sp.delta).toFixed(2)+' ≥ 0.85',action:'Close spread'});
    else if(sp&&Math.abs(sp.delta||0)>=0.70)a.push({time:now,ticker:p.ticker,rule:'R4',level:'WARNING',leg:'P',desc:'Put Δ approaching: '+Math.abs(sp.delta).toFixed(2),action:'Monitor closely.'});
    if(sp&&lp&&sp.cost>0&&spo&&lpo){const o=sp.cost-(lp.cost||0),c=spp-lpp;if(o>0&&c>=0&&c/o<=0.10)a.push({time:now,ticker:p.ticker,rule:'R2',level:'INFO',leg:'P',desc:'Put spread '+(100*(1-c/o)).toFixed(0)+'% captured',action:'Roll forward.'});}
    if(lp&&lp.cost>0&&(lp.bid||0)>0&&sp&&Math.abs(sp.delta||0)<0.85&&(lp.bid)/lp.cost>=2.0)a.push({time:now,ticker:p.ticker,rule:'R5',level:'INFO',leg:'P',desc:'LP at '+((lp.bid)/lp.cost).toFixed(1)+'x cost',action:'DISCRETIONARY: Harvest.'});
  });return a.sort((a,b)=>({CRITICAL:0,URGENT:1,WARNING:2,INFO:3}[a.level])-({CRITICAL:0,URGENT:1,WARNING:2,INFO:3}[b.level]));
}

// ─── TABS ───
function renderTabs(){const bar=document.getElementById('tabBar');const crit=ALERTS.filter(a=>a.level==='CRITICAL').length,urg=ALERTS.filter(a=>a.level==='URGENT').length;
  bar.innerHTML=TABS.map(t=>{let active=t.id===currentTab?' active':'',badge='';
    if(t.id==='alerts'&&(crit+urg)>0)badge=`<span class="tab-badge${crit?'':' warn'}">${crit+urg}</span>`;
    if(t.id==='trades'&&TRADES.length>0)badge=`<span class="tab-badge warn">${TRADES.length}</span>`;
    if(t.id==='weeklyBuild'&&BUILDS.length>0)badge=`<span class="tab-badge info">${BUILDS.length}</span>`;
    return`<button class="tab${active}" onclick="switchTab('${t.id}')">${t.label}${badge}</button>`;}).join('');
}
function switchTab(id){currentTab=id;render();}
function render(){renderTabs();const c=document.getElementById('content');
  if(!DATA||!DATA.positions){c.innerHTML='<p style="color:#52556a;padding:40px;text-align:center">Loading...</p>';return;}
  switch(currentTab){
    case'positions':c.innerHTML=renderPositions();break;case'performance':c.innerHTML=renderPerformance();break;
    case'trades':c.innerHTML=renderTrades();break;
    case'weeklyBuild':c.innerHTML=renderWeeklyBuild();break;case'alerts':c.innerHTML=renderAlerts();break;
    case'earnings':c.innerHTML=renderEarnings();break;case'settings':c.innerHTML=renderSettings();break;
  }
}

// ─── PERFORMANCE ───
function fmt$(n) { return n.toLocaleString('en-US', {minimumFractionDigits:0, maximumFractionDigits:0}); }

let LIVE = null;

async function fetchLive() {
  try { const r = await fetch(API+'/api/live'); if(r.ok) LIVE = await r.json(); } catch(e){}
}

function renderPerformance() {
  const A = ANALYTICS;
  const L = LIVE;
  const nav = L?.fund?.aum || DATA.nav || 906000000;
  const fundPx = L?.fund?.px || A?.fund?.px || 0;
  const connected = L?.connected || false;

  // Fund intraday return from Bloomberg PCT_CHG_ON_DAY (real-time)
  const fundChg = L?.fund?.chg_pct != null ? L.fund.chg_pct : (A?.fund?.daily_chg || 0);
  const qqqChg = L?.fund?.qqq_chg != null ? L.fund.qqq_chg : (A?.benchmark?.daily_chg || 0);

  // Calculate equity P&L from live streaming prices
  let eqPnl = 0;
  (DATA.positions||[]).forEach(p => {
    const lp = L?.prices?.[p.ticker];
    const spot = lp?.last || p.spot || 0;
    const open = lp?.open || p.spotOpen || spot;
    const shares = p.shares || 0;
    if (spot && open && shares) eqPnl += (spot - open) * shares;
  });

  // Calculate options P&L using LIVE spot for option pricing
  let optPnl = 0;
  (DATA.positions||[]).forEach(p => {
    const lp = L?.prices?.[p.ticker];
    const liveSpot = lp?.last || p.spot || 0;
    (p.legs||[]).forEach(l => {
      const [pr] = reliablePrice(l, liveSpot);
      const q = (l.qty||0)*100;
      const cost = l.cost||0;
      if (l.side==='SHORT') optPnl += (cost - pr) * q;
      else optPnl += (pr - cost) * q;
    });
  });

  // Fund-level daily P&L from Bloomberg PCT_CHG_ON_DAY
  const fundDailyPnl = fundChg ? nav * fundChg / 100 : eqPnl + optPnl;
  const fundDailyPct = fundChg || (nav > 0 ? fundDailyPnl / nav * 100 : 0);
  const eqPnlPct = nav > 0 ? (eqPnl / nav * 100) : 0;
  const optPnlPct = nav > 0 ? (optPnl / nav * 100) : 0;
  
  let html = `<div style="display:flex;gap:8px;margin-bottom:14px;align-items:flex-end">
    <div style="flex:1"><div class="metric-label">ULTY Total Daily P&L ${connected?'<span style="color:#22c55e;font-size:8px">● LIVE</span>':'<span style="color:#52556a;font-size:8px">○ DELAYED</span>'}</div>
      <div style="font-size:28px;font-weight:700" class="${fundDailyPnl>=0?'green':'red'}">${fundDailyPnl>=0?'+':'-'}$${fmt$(Math.abs(Math.round(fundDailyPnl)))}</div>
      <div style="font-size:14px;font-weight:600;margin-top:2px" class="${fundDailyPct>=0?'green':'red'}">${fundDailyPct>=0?'+':''}${fundDailyPct.toFixed(2)}%</div></div>
    <div style="margin-left:auto;display:flex;gap:8px">
      <button class="btn btn-accent" style="padding:6px 14px;font-size:10px" onclick="refreshAnalytics()">REFRESH ANALYTICS</button></div></div>`;

  // P&L breakdown
  html += `<div class="metrics">
    <div class="metric"><div class="metric-label">Equity P&L</div>
      <div class="metric-value ${eqPnl>=0?'green':'red'}">${eqPnl>=0?'+':'-'}$${fmt$(Math.abs(Math.round(eqPnl)))}</div>
      <div class="metric-sub ${eqPnlPct>=0?'green':'red'}">${eqPnlPct>=0?'+':''}${eqPnlPct.toFixed(3)}%</div></div>
    <div class="metric"><div class="metric-label">Options P&L</div>
      <div class="metric-value ${optPnl>=0?'green':'red'}">${optPnl>=0?'+':'-'}$${fmt$(Math.abs(Math.round(optPnl)))}</div>
      <div class="metric-sub ${optPnlPct>=0?'green':'red'}">${optPnlPct>=0?'+':''}${optPnlPct.toFixed(3)}%</div></div>
    <div class="metric"><div class="metric-label">AUM</div><div class="metric-value">$${fmt$(nav)}</div></div>
    <div class="metric"><div class="metric-label">ULTY Price</div><div class="metric-value">${fundPx?'$'+Number(fundPx).toFixed(2):'—'}</div>
      <div class="metric-sub ${fundChg>=0?'green':'red'}">${fundChg?(fundChg>=0?'+':'')+Number(fundChg).toFixed(2)+'%':'—'}</div></div>
    <div class="metric"><div class="metric-label">QQQ</div><div class="metric-value">${L?.fund?.qqq_px?'$'+Number(L.fund.qqq_px).toFixed(2):(A?.benchmark?.px?'$'+Number(A.benchmark.px).toFixed(2):'—')}</div>
      <div class="metric-sub ${qqqChg>=0?'green':'red'}">${qqqChg?(qqqChg>=0?'+':'')+Number(qqqChg).toFixed(2)+'%':'—'}</div></div>
    <div class="metric"><div class="metric-label">vs QQQ</div>
      <div class="metric-value ${(fundChg-qqqChg)>=0?'green':'red'}">${fundChg&&qqqChg?((fundChg-qqqChg)>=0?'+':'')+(fundChg-qqqChg).toFixed(2)+'%':'—'}</div></div>
  </div>`;

  // Returns comparison table
  const periods = ['1d','1w','mtd','1m','6m','1y','3y','5y','ytd','inception'];
  const labels = ['1 Day','1 Week','MTD','1 Mo','6 Mo','1 Yr','3 Yr (ann)','5 Yr (ann)','YTD','Inception'];
  html += `<div style="display:flex;gap:16px;margin-bottom:16px"><div style="flex:1">
    <div style="font-size:10px;color:#52556a;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px">Total Return — ULTY vs QQQ</div>
    <div class="grid"><table class="data-table"><thead><tr><th style="text-align:left">Period</th><th>ULTY</th><th>QQQ</th><th>Excess</th></tr></thead><tbody>`;
  periods.forEach((p,i) => {
    const fr = A?.fund?.returns?.[p]; const br = A?.benchmark?.returns?.[p];
    const fv = fr!=null && !isNaN(fr) ? Number(fr) : null;
    const bv = br!=null && !isNaN(br) ? Number(br) : null;
    const ex = (fv!=null && bv!=null) ? fv - bv : null;
    const fc = fv!=null ? (fv>=0?'green':'red') : 'dim';
    const bc = bv!=null ? (bv>=0?'green':'red') : 'dim';
    const ec = ex!=null ? (ex>=0?'green':'red') : 'dim';
    html += `<tr><td class="bold" style="font-size:10px">${labels[i]}</td>
      <td class="center mono ${fc}" style="font-weight:600">${fv!=null?(fv>=0?'+':'')+fv.toFixed(2)+'%':'—'}</td>
      <td class="center mono ${bc}">${bv!=null?(bv>=0?'+':'')+bv.toFixed(2)+'%':'—'}</td>
      <td class="center mono bold ${ec}">${ex!=null?(ex>=0?'+':'')+ex.toFixed(2)+'%':'—'}</td></tr>`;
  });
  html += '</tbody></table></div></div>';

  // Portfolio metrics
  const pm = A?.portfolio_metrics || {};
  html += `<div style="flex:1">
    <div style="font-size:10px;color:#52556a;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px">Portfolio Attributes (NAV-weighted)</div>
    <div class="grid"><table class="data-table"><thead><tr><th style="text-align:left">Metric</th><th>Value</th></tr></thead><tbody>`;
  const metrics = [
    ['Wtd Implied Vol', pm.weighted_iv ? pm.weighted_iv.toFixed(1)+'%' : '—', pm.weighted_iv>50?'#f59e0b':'#c8cad4'],
    ['Beta (vs SPX)', pm.beta ? pm.beta.toFixed(2) : '—', pm.beta>1.2?'#f59e0b':'#c8cad4'],
    ['P/E', pm.pe ? pm.pe.toFixed(1)+'x' : '—', '#c8cad4'],
    ['Fwd P/E', pm.fwd_pe ? pm.fwd_pe.toFixed(1)+'x' : '—', '#c8cad4'],
    ['EV/EBITDA', pm.ev_ebitda ? pm.ev_ebitda.toFixed(1)+'x' : '—', '#c8cad4'],
    ['Sales Growth', pm.sales_growth ? pm.sales_growth.toFixed(1)+'%' : '—', pm.sales_growth>20?'#22c55e':'#c8cad4'],
    ['EPS Growth', pm.eps_growth ? pm.eps_growth.toFixed(1)+'%' : '—', pm.eps_growth>20?'#22c55e':'#c8cad4'],
  ];
  metrics.forEach(([label, val, color]) => {
    html += `<tr><td style="font-size:10px">${label}</td><td class="center mono bold" style="color:${color}">${val}</td></tr>`;
  });
  html += '</tbody></table></div></div></div>';

  // GICS Concentration
  html += `<div style="display:flex;gap:16px;margin-bottom:16px">`;

  // GICS Level 3 (Industry)
  const g3 = A?.concentration?.gics3 || {};
  html += `<div style="flex:1"><div style="font-size:10px;color:#52556a;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px">GICS Industry Concentration (25% limit)</div>
    <div class="grid"><table class="data-table"><thead><tr><th style="text-align:left">Industry</th><th>Weight</th><th>Names</th><th>Status</th></tr></thead><tbody>`;
  Object.entries(g3).forEach(([name, data]) => {
    const w = data.weight;
    const breach = w > 25;
    const wc = breach ? '#ef4444' : w > 20 ? '#f59e0b' : '#c8cad4';
    html += `<tr><td style="font-size:10px">${name}</td>
      <td class="center mono bold" style="color:${wc}">${w.toFixed(1)}%</td>
      <td class="center dim" style="font-size:9px">${data.names.join(', ')}</td>

  return html;
}

async function refreshAnalytics() {
  try {
    const r = await fetch(API+'/api/refresh_analytics');
    if(r.ok) {
      const d = await r.json();
      // Only update if we got real data, not an error
      if(d && !d.error && d.fund) ANALYTICS = d;
    }
  } catch(e) { console.error('Analytics refresh error:', e); }
  // Also fetch live so render has both
  await fetchLive();
  if(LIVE?.prices && DATA?.positions){
    DATA.positions.forEach(p=>{
      const lp=LIVE.prices[p.ticker];
      if(lp?.last) p.spot=lp.last;
      if(lp?.open) p.spotOpen=lp.open;
      if(lp?.chg_pct!=null) p.chgPct=lp.chg_pct;
    });
  }
  render();
}

      html+=`<div style="display:flex;gap:8px;padding:2px 0;font-size:10px"><span style="color:${ac};width:100px;font-weight:600">${l.action}</span>
        <span class="mono dim" style="flex:1">${l.security||''}</span><span class="mono" style="width:50px;text-align:right">Δ ${(l.est_delta||0).toFixed(2)}</span>
        <span class="mono green" style="width:55px;text-align:right">bid $${(l.bid||0).toFixed(2)}</span><span class="mono red" style="width:55px;text-align:right">ask $${(l.ask||0).toFixed(2)}</span>
        <span class="mono" style="width:55px;text-align:right;font-weight:600;color:${ac}">$${l.est_price.toFixed(2)}</span></div>`;});
    html+=`<div style="display:flex;gap:10px;margin-top:4px;font-size:9px;color:#52556a"><span>OTM: C ${(rc.call_otm_pct||0).toFixed(1)}% SP ${(rc.sput_otm_pct||0).toFixed(1)}% LP ${(rc.lput_otm_pct||0).toFixed(1)}%</span>
      <span>Width: $${(rc.spread_width||0).toFixed(0)}</span><span>MaxLoss: $${(rc.max_loss_per_ctr||0).toFixed(2)}/ctr</span><span>DTE: ${rc.dte||0}</span></div></div></details>`;});
  html+='</div>';return html;}
async function runBuild(){try{const r=await fetch(API+'/api/run_build');if(r.ok){const d=await r.json();BUILDS=d.trades||[];render();}}catch(e){}}

// ─── ACTION BUTTONS ───
async function executeTrade(type,ticker){
  if(!confirm(`Execute ${ticker} trade?`))return;
  try{const r=await fetch(`${API}/api/execute/${type}/${ticker}`);if(r.ok){const d=await r.json();
    if(d.status==='ok'){if(type==='trigger')TRADES=TRADES.filter(t=>t.ticker!==ticker);else BUILDS=BUILDS.filter(t=>t.ticker!==ticker);render();}
  }}catch(e){}}
async function dismissTrade(type,ticker){
  try{const r=await fetch(`${API}/api/dismiss/${type}/${ticker}`);if(r.ok){
    if(type==='trigger')TRADES=TRADES.filter(t=>t.ticker!==ticker);else BUILDS=BUILDS.filter(t=>t.ticker!==ticker);render();
  }}catch(e){}}
async function executeAllBuilds(){
  if(!confirm(`Execute all ${BUILDS.length} weekly builds?`))return;
  try{const r=await fetch(`${API}/api/execute_all_builds`);if(r.ok){BUILDS=[];render();}}catch(e){}}

// ─── ALERTS ───
function renderAlerts(){const counts={CRITICAL:0,URGENT:0,WARNING:0,INFO:0};ALERTS.forEach(a=>counts[a.level]++);
  const lc={CRITICAL:'#ef4444',URGENT:'#f59e0b',WARNING:'#d4a017',INFO:'#22c55e'};
  let html=`<div class="metrics">`;['CRITICAL','URGENT','WARNING','INFO'].forEach(l=>{if(counts[l]>0)html+=`<div class="metric"><div class="metric-label">${l}</div><div class="metric-value" style="color:${lc[l]}">${counts[l]}</div></div>`;});
  html+=`<div class="metric"><div class="metric-label">Total</div><div class="metric-value">${ALERTS.length}</div></div></div>`;
  ALERTS.forEach(a=>{const c=lc[a.level];html+=`<div class="alert-row alert-${a.level}"><span class="badge" style="background:${c}18;color:${c}">${a.level}</span>
    <span class="bold" style="width:48px;font-size:11px">${a.ticker}</span><span class="badge badge-sm" style="background:rgba(91,106,191,0.1);color:#5b6abf">${a.rule}</span>
    <span style="font-size:9px;width:14px;text-align:center" class="dim">${a.leg}</span><span style="flex:1;font-size:11px">${a.desc}</span>
    <span style="font-size:10px;max-width:260px;text-align:right" class="dim">${a.action}</span>
    ${a.level==='CRITICAL'||a.level==='URGENT'?`<button class="btn" style="background:${c};padding:3px 10px;font-size:9px">${a.rule==='R4'?'CLOSE SPREAD':'ACT'}</button>`:''}</div>`;});
  if(!ALERTS.length)html+='<div style="padding:40px;text-align:center" class="muted">No alerts.</div>';return html;}

// ─── EARNINGS ───
function renderEarnings(){const EARN={"AMD":"2026-04-29","AMZN":"2026-04-24","GOOGL":"2026-04-22","HOOD":"2026-04-30","LRCX":"2026-04-23","MSTR":"2026-04-29","SCCO":"2026-04-24","PLTR":"2026-05-05","ALAB":"2026-05-06","LITE":"2026-05-06","RDDT":"2026-05-06","COHR":"2026-05-07","RBLX":"2026-05-07","FIX":"2026-05-01","PWR":"2026-05-01","FTNT":"2026-05-08","SMR":"2026-05-08","IREN":"2026-05-15","ADI":"2026-05-20","INTU":"2026-05-22","NVDA":"2026-05-28","CIEN":"2026-06-04","JBL":"2026-06-19"};
  const LM={"ADI":8.1,"ALAB":18.2,"AMD":9.1,"AMZN":7.3,"CIEN":14.5,"COHR":15.3,"FIX":6.8,"FTNT":10.2,"GOOGL":6.8,"HOOD":15.4,"INTU":5.2,"IREN":22.0,"JBL":8.5,"LITE":13.1,"LRCX":10.4,"MSTR":12.8,"NVDA":9.8,"PLTR":16.8,"PWR":7.2,"RBLX":14.0,"RDDT":18.5,"SCCO":5.5,"SMR":20.1};
  const rows=(DATA.positions||[]).filter(p=>EARN[p.ticker]).map(p=>{const d=Math.round((new Date(EARN[p.ticker])-new Date('2026-03-23'))/864e5);const iv=p.iv30||30,em=Math.round(iv*Math.sqrt(7/365)*100*11)/10,lm=LM[p.ticker];
    const ir=Math.min(99,Math.round(iv*1.1)),ex=lm&&lm>em,sig=ir>=65&&ex?'STRONG':ir>=65?'IV HIGH':ex?'EXCEEDS':'';
    return{ticker:p.ticker,spot:p.spot,iv,ir,em,lm,ex,date:EARN[p.ticker],d,sig};}).sort((a,b)=>a.d-b.d);
  let html=`<div class="grid"><table class="data-table"><thead><tr>`;['Ticker','Spot','IV','Rank','EM%','Last','Date','Days','Signal',''].forEach(h=>html+=`<th>${h}</th>`);
  html+='</tr></thead><tbody>';rows.forEach(d=>{const sc=d.sig==='STRONG'?'#22c55e':d.sig==='IV HIGH'?'#d4a017':d.sig==='EXCEEDS'?'#5b6abf':'#52556a';
    const rc=d.ir>=70?'#ef4444':d.ir>=55?'#f59e0b':'#22c55e';
    html+=`<tr><td class="bold text">${d.ticker}</td><td class="center mono">$${d.spot.toFixed(1)}</td><td class="center" style="color:${d.iv>50?'#f59e0b':'#7a7d8e'}">${d.iv}%</td>
      <td class="center"><div style="display:flex;align-items:center;gap:3px;justify-content:center"><div style="width:28px;height:3px;border-radius:2px;background:rgba(255,255,255,0.08);overflow:hidden"><div style="height:100%;width:${d.ir}%;border-radius:2px;background:${rc}"></div></div><span style="font-size:9px;color:${d.ir>=65?'#f59e0b':'#7a7d8e'}">${d.ir}</span></div></td>
      <td class="center mono">±${d.em}%</td><td class="center mono" style="color:${d.ex?'#ef4444':'#7a7d8e'}">${d.lm?'±'+d.lm+'%':'—'}</td>
      <td class="center" style="color:${d.d<=14?'#d4a017':'#7a7d8e'};font-size:10px">${d.date}</td>
      <td class="center" style="color:${d.d<=7?'#ef4444':d.d<=14?'#d4a017':'#7a7d8e'};font-weight:${d.d<=7?700:400}">${d.d}d</td>
      <td class="center">${d.sig?`<span class="badge badge-sm" style="background:${sc}18;color:${sc}">${d.sig}</span>`:''}</td>
      <td class="center"><button class="btn btn-accent" style="font-size:9px">BUILD</button></td></tr>`;});
  html+='</tbody></table></div>';return html;}

// ─── SETTINGS ───
function renderSettings(){const rows=[['Strikes','CALL_OTM','5-7%','Short call OTM'],['','SPUT_OTM','3-4%','Short put OTM'],['','LPUT_OTM','8-10%','Long put OTM'],

// Fast refresh: fetch live prices every 3s, re-render Performance tab with live equity spots
setInterval(async()=>{
  if (typeof HOSTED !== 'undefined' && HOSTED) {
    try {
      const r = await fetch(GIST_API, {headers:{'Accept':'application/vnd.github.v3+json'}, cache:'no-store'});
      if (r.ok) {
        const gist = await r.json();
        const content = gist?.files?.['ulty_live.json']?.content;
        if (content) {
          const hosted = JSON.parse(content);
          if (hosted.positions) DATA = hosted;
          if (hosted.live) LIVE = hosted.live;
          if(LIVE?.prices && DATA?.positions){
            DATA.positions.forEach(p=>{
              const lp=LIVE.prices[p.ticker];
              if(lp?.last) p.spot=lp.last;
              if(lp?.open) p.spotOpen=lp.open;
              if(lp?.chg_pct!=null) p.chgPct=lp.chg_pct;
            });
          }
        }
      }
    } catch(e) {}
    if(currentTab==='performance') render();
    return;
  }
  await fetchLive();
  // Update position spots from live data so options P&L uses current prices
  if(LIVE?.prices && DATA?.positions){
    DATA.positions.forEach(p=>{
      const lp=LIVE.prices[p.ticker];
      if(lp?.last) p.spot=lp.last;
      if(lp?.open) p.spotOpen=lp.open;
      if(lp?.chg_pct!=null) p.chgPct=lp.chg_pct;
    });
  }
  if(currentTab==='performance') render();
},3000);
</script>
